name: county_bora_app
description: "This is my final year project for undergraduate."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Core Backend & Media
  http: ^1.2.0
  image_picker: ^1.0.7
  shared_preferences: ^2.2.3
  cupertino_icons: ^1.0.2

  # Location & Maps
  geolocator: 10.1.0
  flutter_map: 6.0.0
  latlong2: 0.9.0
  url_launcher: ^6.3.0
  app_links: ^6.2.0

  # Data Visualization (Downgraded for compatibility with Flutter 3.16.5)
  fl_chart: 0.66.0
  flutter_radar_chart: ^0.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/city_hall.jpg
    - assets/images/city_banner.jpg